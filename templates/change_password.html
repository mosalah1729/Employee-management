{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="mb-4">
    <h1>Change Password</h1>
    <p class="mt-1 text-secondary">Ensure your account is using a long, random password to stay secure.</p>
</div>

<div class="glass glass-panel" style="max-width: 500px; margin: 0 auto;">
    <div id="error-msg" class="alert alert-error"></div>
    <div id="success-msg" class="alert alert-success"></div>

    <form id="password-form">
        <div class="form-group">
            <label for="old_password" class="form-label">Current Password</label>
            <input type="password" id="old_password" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="new_password" class="form-label">New Password</label>
            <input type="password" id="new_password" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="new_password2" class="form-label">Confirm New Password</label>
            <input type="password" id="new_password2" class="form-control" required>
        </div>
        
        <div class="flex gap-4 mt-4">
            <button type="submit" class="btn btn-primary">
                Update Password
            </button>
            <a href="/profile/" class="btn btn-secondary">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const submitBtn = e.target.querySelector('button[type="submit"]');
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        const oldPassword = document.getElementById('old_password').value;
        const newPassword = document.getElementById('new_password').value;
        const newPassword2 = document.getElementById('new_password2').value;
        
        if (newPassword !== newPassword2) {
            errorMsg.textContent = 'New passwords do not match.';
            errorMsg.style.display = 'block';
            return;
        }
        
        try {
            submitBtn.textContent = 'Updating...';
            submitBtn.disabled = true;
            
            await axios.put('/auth/change-password/', {
                old_password: oldPassword,
                new_password: newPassword,
                new_password2: newPassword2
            });
            
            successMsg.textContent = 'Password updated successfully.';
            successMsg.style.display = 'block';
            e.target.reset();
        } catch (error) {
            errorMsg.style.display = 'block';
            if (error.response && error.response.data) {
                const data = error.response.data;
                const errors = [];
                for (const key in data) {
                    const messages = Array.isArray(data[key]) ? data[key].join(" ") : data[key];
                    errors.push(`${key}: ${messages}`);
                }
                errorMsg.innerHTML = errors.join('<br>');
            } else {
                errorMsg.textContent = 'Failed to change password.';
            }
        } finally {
            submitBtn.textContent = 'Update Password';
            submitBtn.disabled = false;
        }
    });
</script>
{% endblock %}
