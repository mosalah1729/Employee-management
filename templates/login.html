{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block navbar %}
<!-- Hide navbar on auth pages -->
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass glass-panel">
        <div class="text-center mb-4">
            <h1>Welcome Back</h1>
            <p class="mt-1" style="color: var(--text-secondary);">Sign in to manage your employees</p>
        </div>
        
        <div id="error-msg" class="alert alert-error"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Sign In
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
                Don't have an account? <a href="/register/">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = e.target.querySelector('button[type="submit"]');
        
        try {
            submitBtn.textContent = 'Signing in...';
            submitBtn.disabled = true;
            
            const response = await axios.post('/auth/login/', {
                username: usernameInput,
                password: passwordInput
            });
            
            // Save tokens
            localStorage.setItem('access_token', response.data.access);
            localStorage.setItem('refresh_token', response.data.refresh);
            
            // Redirect to dashboard
            window.location.href = '/dashboard/';
            
        } catch (error) {
            errorMsg.style.display = 'block';
            if (error.response && error.response.status === 401) {
                errorMsg.textContent = 'Invalid username or password.';
            } else {
                errorMsg.textContent = 'An error occurred during login. Please try again.';
            }
            
            submitBtn.textContent = 'Sign In';
            submitBtn.disabled = false;
        }
    });
</script>
{% endblock %}
