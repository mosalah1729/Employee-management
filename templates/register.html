{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block navbar %}
<!-- Hide navbar on auth pages -->
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass glass-panel">
        <div class="text-center mb-4">
            <h1>Create Account</h1>
            <p class="mt-1" style="color: var(--text-secondary);">Join EmpMgmt today</p>
        </div>
        
        <div id="error-msg" class="alert alert-error"></div>
        <div id="success-msg" class="alert alert-success"></div>
        
        <form id="register-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="email" class="form-label">Email (Optional)</label>
                <input type="email" id="email" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            
            <div class="form-group">
                <label for="password_confirm" class="form-label">Confirm Password</label>
                <input type="password" id="password_confirm" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Register
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
                Already have an account? <a href="/login/">Sign In</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');
        const submitBtn = e.target.querySelector('button[type="submit"]');
        
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password_confirm').value;
        
        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';
        
        if (password !== passwordConfirm) {
            errorMsg.textContent = 'Passwords do not match.';
            errorMsg.style.display = 'block';
            return;
        }
        
        try {
            submitBtn.textContent = 'Registering...';
            submitBtn.disabled = true;
            
            const response = await axios.post('/auth/register/', {
                username: username,
                email: email,
                password: password,
                password2: passwordConfirm
            });
            
            // Save tokens automatically to log in
            if (response.data.access) {
                localStorage.setItem('access_token', response.data.access);
                localStorage.setItem('refresh_token', response.data.refresh);
                
                successMsg.textContent = 'Registration successful! Redirecting...';
                successMsg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 1000);
            }
            
        } catch (error) {
            submitBtn.textContent = 'Register';
            submitBtn.disabled = false;
            
            errorMsg.style.display = 'block';
            if (error.response && error.response.data) {
                // Formatting DRF errors nicely
                const data = error.response.data;
                const errors = [];
                for (const key in data) {
                    const messages = Array.isArray(data[key]) ? data[key].join(" ") : data[key];
                    errors.push(`${key}: ${messages}`);
                }
                errorMsg.innerHTML = errors.join('<br>');
            } else {
                errorMsg.textContent = 'Registration failed. Please try again.';
            }
        }
    });
</script>
{% endblock %}
